<!DOCTYPE html>
<html>
<head>
    <title>Pantal Shop</title>
        <link rel="stylesheet" type="text/css" href="style.css" />


</head>
<body>

<div class="container">

    <h1>Welcome to Pantal Shop</h1>
    <h3>About This Lab</h3>
    <br>
    <p>
        In this lab, you will learn basic HTML structure,
         formatting text, creating simple tables, and using forms for input.
    </p>

    <br>
    <table border="1">
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Pencils</td>
            <td>100</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
        </tr>
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr>
    </table>
    <div class="form-box">

        <h2>Contact Information</h2>

        <div class="row">
            <label>Name</label>
            <input type="text">
        </div>
        <div class="row">
            <label>Email</label>
            <input type="email">
        </div>
        <div class="row">
            <label>Message</label>
            <textarea rows="5"></textarea>
        </div>
        <button type="submit">Submit</button>

    </div>
</div>

</body>
</html>
